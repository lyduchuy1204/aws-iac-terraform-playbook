name: Terraform Apply (prod)

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: read

env:
  TF_WORKING_DIR: envs/prod

jobs:
  apply:
    name: terraform apply (prod)
    runs-on: ubuntu-latest

    # GitHub Environment "production" cần có Required reviewers — tạo qua
    # Settings → Environments. Job sẽ pause cho tới khi reviewer approve.
    environment:
      name: production

    concurrency:
      group: terraform-apply-prod
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: gha-apply-prod-${{ github.run_id }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.11.4
          terraform_wrapper: false

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -no-color

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate -no-color

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -no-color -input=false -out=tfplan

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-prod-${{ github.ref_name }}
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 30

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -no-color -input=false -auto-approve tfplan
