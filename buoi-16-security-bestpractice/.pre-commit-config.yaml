# =============================================================================
# pre-commit hooks cho repo Terraform
# Cài đặt:
#   pip install pre-commit
#   pre-commit install
# Chạy thủ công toàn repo:
#   pre-commit run -a
# =============================================================================
repos:
  # Bộ hooks chuyên cho Terraform (chứa fmt, validate, tflint, tfsec, ...)
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.1
    hooks:
      # Tự động format code .tf
      - id: terraform_fmt

      # terraform validate cho mỗi root module
      - id: terraform_validate

      # Lint cú pháp + best-practice (cần file .tflint.hcl)
      - id: terraform_tflint
        args:
          - --args=--config=__GIT_WORKING_DIR__/.tflint.hcl

      # Quét bảo mật bằng tfsec
      # Nếu team đã chuyển sang trivy: thay id thành `terraform_trivy`
      - id: terraform_tfsec

      # Sinh README cho từng module từ comment input/output
      - id: terraform_docs
        args:
          - --hook-config=--path-to-file=README.md
          - --hook-config=--add-to-existing-file=true
          - --hook-config=--create-file-if-not-exist=true

  # Hooks chung cho mọi repo
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files
        args: ["--maxkb=500"]
